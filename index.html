<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lichess Analysis Embed</title>
  <style>
    html,body {
      margin:0;
      /* padding:0; */
      height:100%;
      /* width:100%; */
      overflow:hidden;
      /* font-family: system-ui, -apple-system, 'Segoe UI', Roboto; */
      background:#fff;
      /* background:#161512; */
    }
    .wrap {
      max-width:100%;
    }
    .card {
      background:#fff;
      /* border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06); */
    }
    .iframe-wrap {
      width:100%;
      height:1200px;
      overflow:hidden;
      display:flex;
      justify-content:center;
    }
    .iframe-wrap iframe {
      width:100%;
      height:100%;
      /*transform:scale(0.95);
      transform-origin:top;*/
      border:0;
      /* border-radius:8px; */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="iframe-wrap">
        <iframe
          src="https://lichess.org/embed/analysis?theme=grey&pieceSet=merida&bg=dark"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
      <script>
    // 1. URL에서 FEN 파라미터를 가져오는 함수
    function getFENFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('fen');
    }

    // 2. Iframe 주소 설정
    const fen = getFENFromURL();
    const iframe = document.getElementById('lichess-board');
    
    // 기본 주소 (기본 포지션)
    let baseUrl = "https://lichess.org/embed/analysis?theme=grey&pieceSet=merida&bg=dark";
    
    // FEN이 URL에 있으면 주소 뒤에 붙여줌
    if (fen) {
      // 리체스 임베드는 공백( ) 대신 언더바(_)를 사용해야 할 때가 있으므로 처리
      const formattedFen = fen.replace(/ /g, '_');
      baseUrl += "&fen=" + formattedFen;
    }

    iframe.src = baseUrl;
  </script>

      
    </div>
  </div>
</body>
</html>
