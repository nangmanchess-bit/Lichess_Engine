<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lichess Analysis Embed</title>
  <style>
    html,body {
      height:100%;
      margin:0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
      background:#f7f7f7;
    }
    .wrap {
      max-width:1100px;
    }
    .card {
      background:#fff;
      /* border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06); */
    }
    .iframe-wrap {
      width:100%;
      height:85vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
    }
    .iframe-wrap iframe {
      width:100%;
      height:110%;
      /*transform:scale(0.95);
      transform-origin:top;*/
      border:0;
      /* border-radius:8px; */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="iframe-wrap">
        <iframe
          src="https://lichess.org/embed/analysis?theme=grey&pieceSet=merida&bg=dark"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>
</body>
</html>
