<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lichess Analysis Embed</title>
  <style>
    html,body {
      margin:0;
      /* padding:0; */
      height:100%;
      /* width:100%; */
      overflow:hidden;
      /* font-family: system-ui, -apple-system, 'Segoe UI', Roboto; */
      background:#fff;
      /* background:#161512; */
    }
    .wrap {
      max-width:100%;
    }
    .card {
      background:#fff;
      /* border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06); */
    }
    /* 2. 상단 입력창 영역 스타일 */
    .input-container {
      padding: 10px;
      background: #262421;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #404040;
    }
    input[type="text"] {
      flex: 1;
      background: #3d3d3d;
      border: 1px solid #555;
      color: white;
      padding: 8px;
      border-radius: 4px;
    }
    button {
      background: #45a049;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #3e8e41;
    }
    
    .iframe-wrap {
      width:100%;
      height:1200px;
      overflow:hidden;
      display:flex;
      justify-content:center;
    }
    .iframe-wrap iframe {
      width:100%;
      height:100%;
      /*transform:scale(0.95);
      transform-origin:top;*/
      border:0;
      /* border-radius:8px; */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="input-container">
    <input type="text" id="fenInput" placeholder="FEN 주소를 여기에 붙여넣으세요...">
    <button onclick="updateBoard()">포지션 변경</button>
  </div>
      <div class="iframe-wrap">
        <iframe
          src="https://lichess.org/embed/analysis?theme=grey&pieceSet=merida&bg=dark"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
      <script>
    function updateBoard() {
      const fen = document.getElementById('fenInput').value;
      if (!fen) return;

      // FEN의 공백을 리체스용 언더바(_)로 변환
      const cleanFen = fen.trim().replace(/\s+/g, '_');
      
      // Iframe 주소 업데이트
      document.getElementById('chess-board').src = 
        "https://lichess.org/embed/analysis?theme=grey&pieceSet=merida&bg=dark&fen=" + cleanFen;
    }

    // 엔터키 입력 시에도 적용되도록 추가
    document.getElementById('fenInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        updateBoard();
      }
    });
  </script>

      
    </div>
  </div>
</body>
</html>
